<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="description" content="Energy Blend Boost — Organic spice blend designed to give your meals a natural energy lift. Made with all organic ingredients for flavor and vitality.">
<meta name="keywords" content="Energy Boost, organic spice blend, energy seasoning, vitality, all organic">
<meta property="og:title" content="Energy Blend Boost — Organic Spice for Energy">
<meta property="og:description" content="Give your dishes a natural energy lift with Energy Blend Boost, an all-organic spice blend crafted for vitality and flavor.">
<meta property="og:image" content="https://www.cardiospice.com/images/boost.jpg">
<meta property="og:url" content="https://www.cardiospice.com/boost.html">
<meta property="og:type" content="website">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Energy Blend — Cardio Spice</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>

  :root {
    --crimson: #8b1a1a;
    --red:     #c0392b;
    --hot:     #e74c3c;
    --orange:  #e67e22;
    --green:   #27ae60;
    --dark:    #0d0d0d;
    --panel:   #111;
    --border:  rgba(180,40,40,0.28);
    --text:    #f0e8e0;
    --muted:   #9a8a7a;
    --chrome:  #c8b89a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── HAMBURGER BUTTON ── */
  .menu-btn {
    position: fixed;
    top: 24px; left: 24px;
    z-index: 300;
    width: 64px; height: 64px;
    background: linear-gradient(145deg, #1e0a0a, #2d0e0e);
    border: 1px solid rgba(220,60,30,0.5);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 7px;
    backdrop-filter: blur(12px);
    box-shadow:
      0 0 0 1px rgba(180,40,20,0.2),
      0 4px 20px rgba(0,0,0,0.6),
      0 0 18px rgba(200,50,20,0.25),
      inset 0 1px 0 rgba(255,255,255,0.06);
    transition: all 0.25s ease;
  }
  .menu-btn:hover {
    background: linear-gradient(145deg, #2d0e0e, #3e1010);
    border-color: var(--hot);
    box-shadow:
      0 0 0 1px rgba(231,76,60,0.4),
      0 4px 24px rgba(0,0,0,0.7),
      0 0 30px rgba(231,76,60,0.45),
      inset 0 1px 0 rgba(255,255,255,0.08);
    transform: scale(1.05);
  }
  .menu-btn span {
    display: block;
    height: 2.5px;
    background: linear-gradient(90deg, var(--hot), var(--chrome));
    border-radius: 3px;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s, width 0.3s;
  }
  .menu-btn span:nth-child(1) { width: 32px; }
  .menu-btn span:nth-child(2) { width: 24px; }
  .menu-btn span:nth-child(3) { width: 28px; }
  .menu-btn:hover span { background: linear-gradient(90deg, #ff6b6b, #fff); }
  .menu-btn.open span:nth-child(1) { width: 30px; transform: translateY(9.5px) rotate(45deg); }
  .menu-btn.open span:nth-child(2) { opacity: 0; width: 0; }
  .menu-btn.open span:nth-child(3) { width: 30px; transform: translateY(-9.5px) rotate(-45deg); }

  /* ── DRAWER ── */
  .drawer {
    position: fixed;
    top: 0; left: 0;
    width: 280px; height: 100vh;
    background: var(--panel);
    border-right: 1px solid var(--border);
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .drawer-header {
    padding: 80px 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-header .brand {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--chrome);
    text-transform: uppercase;
  }

  .drawer nav { flex: 1; padding: 12px 0; }

  .nav-link {
    display: block;
    padding: 11px 24px;
    color: var(--text);
    text-decoration: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-left: 3px solid transparent;
    transition: all 0.2s;
  }
  .nav-link:hover {
    background: rgba(200,40,40,0.12);
    color: var(--hot);
    border-left-color: var(--hot);
    padding-left: 30px;
  }

  .nav-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 24px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .nav-section-header:hover {
    background: rgba(200,40,40,0.12);
    color: var(--hot);
    border-left-color: var(--hot);
  }
  .arrow { font-size: 10px; color: var(--muted); transition: transform 0.25s; }
  .nav-section-header.open .arrow { transform: rotate(90deg); }

  .nav-sub { display: none; background: rgba(0,0,0,0.2); }
  .nav-sub.open { display: block; }

  .sub-label {
    display: block;
    padding: 8px 24px 2px 32px;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    margin-top: 4px;
  }
  .sub-label.heart   { color: #e74c3c; }
  .sub-label.brain   { color: #9b59b6; }
  .sub-label.energy  { color: #e67e22; }
  .sub-label.joint   { color: #1abc9c; }

  .nav-sub a {
    display: block;
    padding: 6px 24px 6px 40px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.5px;
    border-left: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav-sub a:hover { color: var(--orange); padding-left: 48px; border-left-color: var(--orange); }
  .sub-label.heart:visited   { color: #e74c3c; }
  .sub-label.brain:visited   { color: #9b59b6; }
  .sub-label.energy:visited  { color: #e67e22; }
  .nav-flavor-link:visited   { color: inherit; }

  .nav-flavor {
    display: block;
    padding: 4px 24px 4px 44px;
    color: #555;
    font-size: 12px;
    font-family: 'Lato', sans-serif;
    letter-spacing: 1px;
    cursor: default;
  }

  .nav-divider { height: 1px; background: var(--border); margin: 8px 20px; }

  .drawer-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
    font-family: 'Rajdhani', sans-serif;
    text-transform: uppercase;
  }

  /* ── LANDING ── */
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    padding: 60px 30px 60px;
    background:
      radial-gradient(ellipse at 50% 40%, #3a0a00 0%, #180400 45%, #0d0d0d 80%);
    position: relative;
    overflow: hidden;
  }

  .landing::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(180,40,40,0.03) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(180,40,40,0.03) 60px);
    pointer-events: none;
  }

  /* ── LOGO ── */
  .logo-wrap {
    position: relative;
    z-index: 2;
    margin-bottom: 36px;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  .logo-wrap svg {
    width: 220px;
    height: 240px;
    filter: drop-shadow(0 0 40px rgba(220,60,20,0.75));
  }
  @keyframes pulse-glow {
    0%,100% { filter: drop-shadow(0 0 36px rgba(220,60,20,0.7)); }
    50%      { filter: drop-shadow(0 0 65px rgba(220,80,20,1)); }
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(42px, 8vw, 84px);
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 10%, #e8c09a 45%, #c0392b 85%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
    animation: fadeUp 0.8s ease both;
  }

  .slogan {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #ffffff;
    line-height: 1.5;
    margin-bottom: 28px;
    position: relative;
    z-index: 2;
    animation: fadeUp 0.9s 0.15s ease both;
  }
  .slogan span { color: #ffffff; font-weight: 700; letter-spacing: 6px; }

  .info-badge {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: linear-gradient(135deg, rgba(20,80,40,0.4), rgba(10,50,25,0.6));
    border: 1px solid rgba(46,204,113,0.5);
    color: #2ecc71;
    border-radius: 8px;
    padding: 16px 40px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
    margin-top: 24px;
    animation: fadeUp 1s 0.3s ease both;
    box-shadow:
      0 0 0 1px rgba(46,204,113,0.2),
      0 0 24px rgba(46,204,113,0.2),
      0 4px 20px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06);
    text-shadow: 0 0 20px rgba(46,204,113,0.6);
  }
  .info-badge::before { content: none; }
  .info-badge::after  { content: none; }
  .badge-line1 { font-size: 13px; letter-spacing: 5px; opacity: 0.8; }
  .badge-line2 { font-size: 22px; letter-spacing: 5px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ecg-bar {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: min(600px, 90vw);
    opacity: 0.2;
    z-index: 1;
  }

  /* ── PAGES ── */
  .page {
    display: none;
    min-height: 100vh;
    padding: 100px 60px 80px;
    background:
      radial-gradient(ellipse at 50% 40%, #3a0a00 0%, #180400 45%, #0d0d0d 80%);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(180,40,40,0.03) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(180,40,40,0.03) 60px);
    pointer-events: none;
  }
  .page.active { display: block; }

  .page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .page-heading {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 50px;
    letter-spacing: 2px;
  }
  .page-heading span { color: var(--hot); }

  .store-grid {
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 600px;
  }

  .store-card {
    display: flex;
    align-items: center;
    gap: 28px;
    background: linear-gradient(135deg, #1a1a1a, #111);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }
  .store-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    transition: opacity 0.25s;
    opacity: 0.6;
  }
  .store-card.etsy::before  { background: linear-gradient(90deg, #f1641e, #f5a623); }
  .store-card.amazon::before { background: linear-gradient(90deg, #ff9900, #ffbd47); }
  .store-card:hover {
    transform: translateY(-4px);
    border-color: rgba(220,80,30,0.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 24px rgba(220,80,30,0.15);
  }
  .store-card:hover::before { opacity: 1; }

  .store-icon {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
  }
  .store-card.etsy  .store-icon { background: rgba(241,100,30,0.15); border: 1px solid rgba(241,100,30,0.3); }
  .store-card.amazon .store-icon { background: rgba(255,153,0,0.15); border: 1px solid rgba(255,153,0,0.3); }

  .store-info { flex: 1; }
  .store-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .store-card.etsy  .store-name { color: #f1641e; }
  .store-card.amazon .store-name { color: #ff9900; }
  .store-desc {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .store-arrow {
    font-size: 22px;
    color: var(--muted);
    transition: transform 0.2s, color 0.2s;
  }
  .store-card:hover .store-arrow { transform: translateX(5px); color: var(--text); }

  /* ── PRODUCT PAGES ── */
  .product-page-inner {
    max-width: 900px;
  }
  .product-page-header {
    display: flex;
    align-items: center;
    gap: 50px;
    margin-bottom: 60px;
  }
  .product-page-icon {
    flex-shrink: 0;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  .product-page-icon img {
    width: 220px;
    height: auto;
    filter: drop-shadow(0 0 30px rgba(220,60,20,0.5));
  }
  .product-page-desc {
    color: var(--muted);
    font-size: 16px;
    line-height: 1.8;
    margin-top: 14px;
  }
  .variant-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .variant-card {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .variant-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--crimson), var(--orange));
  }
  .variant-card:hover {
    border-color: var(--hot);
    transform: translateY(-4px);
  }
  .variant-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .variant-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--chrome);
    letter-spacing: 2px;
  }
  .heat-dots { display: flex; gap: 5px; }
  .heat-dots .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .heat-dots .dot.on { background: var(--hot); border-color: var(--hot); box-shadow: 0 0 6px rgba(231,76,60,0.7); }
  .variant-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .variant-tag {
    display: inline-block;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    background: rgba(200,50,20,0.2);
    border: 1px solid rgba(200,50,20,0.4);
    color: var(--hot);
  }
  .variant-tag.extreme {
    background: rgba(139,0,0,0.3);
    border-color: rgba(200,20,20,0.6);
    color: #ff4444;
  }
  @media (max-width: 700px) {
    .product-page-header { flex-direction: column; text-align: center; }
    .product-page-icon img { width: 160px; }
  }

  /* ── FOOTER ── */
  footer {
    background: #080808;
    border-top: 1px solid var(--border);
    padding: 28px 40px;
    text-align: center;
  }
  .footer-lab {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--chrome);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .footer-legal {
    color: #484848;
    font-size: 11px;
    line-height: 1.7;
    max-width: 860px;
    margin: 0 auto 12px;
  }
  .footer-copy {
    color: #333;
    font-size: 10px;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--crimson); border-radius: 3px; }

  /* ── CTA BUTTONS ── */
  .cta-wrap {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 28px 0 0;
  }
  .cta-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 32px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s ease;
    display: inline-block;
  }
  .cta-btn-primary {
    background: linear-gradient(135deg, #c0392b, #8b1a1a);
    color: #fff;
    border: 1px solid rgba(231,76,60,0.5);
    box-shadow: 0 0 20px rgba(200,50,20,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .cta-btn-primary:hover {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    box-shadow: 0 0 32px rgba(231,76,60,0.65), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .cta-btn-secondary {
    background: transparent;
    color: #c8b89a;
    border: 1px solid rgba(200,184,154,0.4);
    box-shadow: 0 0 12px rgba(200,184,154,0.1);
  }
  .cta-btn-secondary:hover {
    background: rgba(200,184,154,0.08);
    border-color: #c8b89a;
    color: #fff;
    box-shadow: 0 0 20px rgba(200,184,154,0.25);
    transform: translateY(-2px);
  }


  /* ── GALLERY ── */
  .gallery-wrap {
    position: relative;
    z-index: 1;
    padding: 100px 24px 60px;
    max-width: 520px;
    margin: 0 auto;
  }
  .gallery-main {
    width: 100%;
    aspect-ratio: 3 / 5;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(180,40,40,0.3);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    margin-bottom: 16px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gallery-main img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity 0.2s ease;
  }
  .gallery-thumbs {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .gallery-thumb {
    flex: 1;
    aspect-ratio: 3 / 5;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.08);
    background: #ffffff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gallery-thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }
  .gallery-thumb.active {
    border-color: #e74c3c;
    box-shadow: 0 0 14px rgba(231,76,60,0.5);
  }
  .gallery-thumb:hover:not(.active) {
    border-color: rgba(231,76,60,0.35);
  }

  body {
    min-height: 100vh;
    background: #1a1a1a;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
